<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Balance</title>
    <link rel="stylesheet" href="../styles/account-balance.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>Account Balance</h1>
        </div>

        <!-- Balance Card -->
        <div class="balance-card">
            <div class="balance-item">
                <span class="label">Debit Balance</span>
                <span class="amount">$875</span>
            </div>
            <span class="separator">−</span>
            <div class="balance-item">
                <span class="label">Credit Balance</span>
                <span class="amount">$200</span>
            </div>
            <span class="separator">=</span>
            <div class="balance-item highlight">
                <span class="label">Account Balance</span>
                <span class="amount">$675</span>
            </div>
        </div>

        <!-- Success Message -->
        <div class="success-container">
            <div class="success-icon">✓</div>
            <p class="success-text">Bank balance fetched successfully</p>
        </div>

        <!-- Bank Details -->
        <div class="bank-details">
            <div class="bank-header">
                <span class="bank-icon">🏦</span>
                <span class="bank-name">Axis Bank</span>
                <span class="account-number">- 4736</span>
            </div>
            <div class="bank-amount">₹ 15,00,000.46</div>
        </div>

        <!-- Sponsored Links Section -->
        <div class="sponsored-section">
            <h3>Sponsored Links</h3>
            <div class="sponsor-grid">
                <div class="sponsor-item">
                    <div class="sponsor-logo">Kotak</div>
                    <span class="sponsor-name">Kotak811</span>
                </div>
                <div class="sponsor-item">
                    <div class="sponsor-logo">RC</div>
                    <span class="sponsor-name">RummyCircle</span>
                </div>
                <div class="sponsor-item">
                    <div class="sponsor-logo">SE</div>
                    <span class="sponsor-name">Sh esy</span>
                </div>
                <div class="sponsor-item">
                    <div class="sponsor-logo">A23</div>
                    <span class="sponsor-name">A23 Rummy</span>
                </div>
            </div>
        </div>

        <!-- Featured Card -->
        <div class="featured-card">
            <div class="featured-icon">💡</div>
            <h4>Grow your money with Best SIP Funds. Start with just Rs. 100.</h4>
            <span class="arrow">›</span>
        </div>
    </div>
</body>
</html>
